{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-2 sidebar py-3 d-none d-md-block">
        <nav class="nav flex-column px-2">
            <a class="nav-link" href="{{ url_for('student.dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a class="nav-link" href="{{ url_for('student.my_applications') }}"><i class="bi bi-file-earmark-text me-2"></i>My Applications</a>
            <a class="nav-link active" href="{{ url_for('student.profile') }}"><i class="bi bi-person me-2"></i>Profile</a>
        </nav>
    </div>
    <div class="col-md-10 py-3">
        <div class="col-md-7">
            <h4 class="mb-4">My Profile</h4>
            <div class="card p-4">
                <form method="POST" enctype="multipart/form-data" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" class="form-control" value="{{ current_user.roll_number or '' }}" disabled>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CGPA</label>
                            <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10" value="{{ current_user.cgpa or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" name="department" class="form-control" value="{{ current_user.department or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Skills</label>
                        <input type="text" name="skills" class="form-control" value="{{ current_user.skills or '' }}" placeholder="Python, SQL, Flask...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Resume (PDF/DOC/DOCX)</label>
                        <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
                        {% if current_user.resume_filename %}
                            <div class="form-text text-success"><i class="bi bi-file-earmark-check me-1"></i>Current: {{ current_user.resume_filename }}</div>
                        {% endif %}
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">New Password <span class="text-muted small">(leave blank to keep current)</span></label>
                        <input type="password" name="new_password" class="form-control" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
