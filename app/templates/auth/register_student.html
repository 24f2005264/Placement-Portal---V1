{% extends 'base.html' %}
{% block title %}Student Registration - Placement Portal{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="mb-4"><i class="bi bi-person-plus me-2 text-primary"></i>Student Registration</h4>
            <form method="POST" enctype="multipart/form-data" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Roll Number <span class="text-danger">*</span></label>
                        <input type="text" name="roll_number" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">CGPA</label>
                        <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Skills (comma separated)</label>
                    <input type="text" name="skills" class="form-control" placeholder="Python, SQL, Flask...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Resume (PDF/DOC/DOCX)</label>
                    <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <div class="text-center mt-3 small">
                Already registered? <a href="{{ url_for('auth.login') }}">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
