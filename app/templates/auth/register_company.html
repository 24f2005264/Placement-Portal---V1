{% extends 'base.html' %}
{% block title %}Company Registration - Placement Portal{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="mb-4"><i class="bi bi-building me-2 text-primary"></i>Company Registration</h4>
            <form method="POST" novalidate>
                <div class="mb-3">
                    <label class="form-label">Company Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">HR Contact</label>
                    <input type="text" name="hr_contact" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Website</label>
                    <input type="url" name="website" class="form-control" placeholder="https://...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Industry</label>
                    <input type="text" name="industry" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Registration</button>
            </form>
            <div class="text-center mt-3 small">
                Already registered? <a href="{{ url_for('auth.login') }}">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
