{% extends 'base.html' %}
{% block title %}Login - Placement Portal{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="text-center mb-4"><i class="bi bi-mortarboard-fill me-2 text-primary"></i>Placement Portal</h4>
            <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                <div class="mb-3">
                    <label class="form-label">Login As</label>
                    <select name="role" class="form-select" required>
                        <option value="student">Student</option>
                        <option value="company">Company</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <hr>
            <div class="text-center small">
                <a href="{{ url_for('auth.register_student') }}">Register as Student</a> &nbsp;|&nbsp;
                <a href="{{ url_for('auth.register_company') }}">Register as Company</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
