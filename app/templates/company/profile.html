{% extends 'base.html' %}
{% block title %}Company Profile{% endblock %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-2 sidebar py-3 d-none d-md-block">
        <nav class="nav flex-column px-2">
            <a class="nav-link" href="{{ url_for('company.dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a class="nav-link" href="{{ url_for('company.new_drive') }}"><i class="bi bi-plus-circle me-2"></i>New Drive</a>
            <a class="nav-link active" href="{{ url_for('company.profile') }}"><i class="bi bi-building me-2"></i>Profile</a>
        </nav>
    </div>
    <div class="col-md-10 py-3">
        <div class="col-md-7">
            <h4 class="mb-4">Company Profile</h4>
            <div class="card p-4">
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" class="form-control" value="{{ current_user.name }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">HR Contact</label>
                        <input type="text" name="hr_contact" class="form-control" value="{{ current_user.hr_contact or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url" name="website" class="form-control" value="{{ current_user.website or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Industry</label>
                        <input type="text" name="industry" class="form-control" value="{{ current_user.industry or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ current_user.description or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
